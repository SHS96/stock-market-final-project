<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aster Markets | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Aster Markets</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="market.html">Market</a></li>
                <li class="nav-item"><a class="nav-link" href="stock-detail.html">Stock Detail</a></li>
                <li class="nav-item"><a class="nav-link" href="portfolio.html">Portfolio</a></li>
                <li class="nav-item"><a class="nav-link" href="pro.html">Pro</a></li>
                <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Login / Register Section -->
<section class="hero">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <!-- Tabs -->
                <ul class="nav nav-pills mb-4 justify-content-center" id="authTabs">
                    <li class="nav-item">
                        <button class="nav-link active" id="loginTab" onclick="showTab('login')">Login</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="registerTab" onclick="showTab('register')">Register</button>
                    </li>
                </ul>

                <!-- Login Form -->
                <div id="loginForm" class="card card-custom p-4">
                    <h4 class="fw-bold mb-4">Welcome Back</h4>
                    <div class="mb-3">
                        <label class="form-label" style="color:var(--text-muted)">Email</label>
                        <input type="email" class="form-control" style="background:#0E1020; border-color:#2a2d4a; color:white" placeholder="you@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="color:var(--text-muted)">Password</label>
                        <input type="password" class="form-control" style="background:#0E1020; border-color:#2a2d4a; color:white" placeholder="••••••••">
                    </div>
                    <button
                        type="button"
                        class="btn-custom d-block w-100 text-center mt-3"
                        onclick="window.location.href='index.html'"
                    >
                        Login
                    </button>
                    <p class="text-center mt-3" style="color:var(--text-muted); font-size:0.85rem">Don't have an account? <a href="#" style="color:var(--primary-blue)" onclick="showTab('register')">Register</a></p>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="card card-custom p-4" style="display:none">
                    <h4 class="fw-bold mb-4">Create Account</h4>
                    <div class="mb-3">
                        <label class="form-label" style="color:var(--text-muted)">Full Name</label>
                        <input type="text" class="form-control" style="background:#0E1020; border-color:#2a2d4a; color:white" placeholder="Your Name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="color:var(--text-muted)">Email</label>
                        <input type="email" class="form-control" style="background:#0E1020; border-color:#2a2d4a; color:white" placeholder="you@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="color:var(--text-muted)">Password</label>
                        <input type="password" class="form-control" style="background:#0E1020; border-color:#2a2d4a; color:white" placeholder="••••••••">
                    </div>
                    <button
                        type="button"
                        class="btn-custom d-block w-100 text-center mt-3"
                        onclick="window.location.href='index.html'"
                    >
                        Register
                    </button>
                    <p class="text-center mt-3" style="color:var(--text-muted); font-size:0.85rem">Already have an account? <a href="#" style="color:var(--primary-blue)" onclick="showTab('login')">Login</a></p>
                </div>

            </div>
        </div>
    </div>
</section>

<footer class="footer text-center">
    <div class="container">
        <p class="mb-0">© 2026 Aster Markets. Stock market tracking web app.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
    function showTab(tab) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');

        if (tab === 'login') {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
        } else {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
        }
    }
</script>

</body>
</html>
